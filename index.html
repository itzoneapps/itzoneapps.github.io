<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IT ZONE</title>

<style>
:root{
  --line:#d8e3f0;
  --shadow:0 20px 50px rgba(20,55,95,.16);
  --text:#223146;
  --muted:#5f6f86;
  --blue:#2455b2;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#f7fbff,#eef4fb);
  color:var(--text);
}

/* HERO - NE DIRAJ */
.hero{
  margin:20px;
  min-height:300px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  background:url("logo3.jpg") center/cover no-repeat;
  box-shadow:var(--shadow);
}

.hero-inner{
  position:relative;
  min-height:300px;
  padding:40px;
}

/* SIDEBAR */
.layout{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:20px;
}

.sidebar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
}

.sidebar button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  text-align:left;
  font-weight:700;
  cursor:pointer;
}

.sidebar button.active{
  background:#eef5ff;
  color:#2455b2;
}

/* CONTENT */
.content{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:30px;
}

.section{
  border:1px solid var(--line);
  border-radius:16px;
  padding:20px;
  margin-bottom:15px;
}

/* FOOTER - DISKRETAN */
.footer-links{
  padding:20px;
  text-align:center;
  font-size:11px;
  color:#8a96a8;
}

.footer-nav{
  display:flex;
  justify-content:center;
  gap:8px;
  opacity:.6;
  margin-bottom:6px;
}

.footer-nav button{
  border:0;
  background:none;
  font-size:11px;
  cursor:pointer;
  color:#7d899a;
}

.footer-nav button:hover{
  color:#2455b2;
  text-decoration:underline;
}

.footer-nav span{
  color:#aaa;
}
</style>
</head>

<body>

<!-- HERO OSTAO ISTI -->
<div class="hero">
  <div class="hero-inner"></div>
</div>

<div class="layout">

<!-- SIDEBAR - OČIŠĆEN -->
<aside class="sidebar">
  <button class="nav-btn active" onclick="show('home',this)">Početna</button>
  <button class="nav-btn" onclick="show('apps',this)">Aplikacije</button>
  <button class="nav-btn" onclick="show('news',this)">Novosti</button>
</aside>

<!-- CONTENT -->
<main class="content">
  <h2 id="title"></h2>
  <div id="content"></div>
</main>

</div>

<!-- FOOTER -->
<footer class="footer-links">
  <div class="footer-nav">
    <button onclick="showFooter('contact')">Kontakt</button>
    <span>•</span>
    <button onclick="showFooter('privacy')">Privacy</button>
    <span>•</span>
    <button onclick="showFooter('agb')">AGB</button>
    <span>•</span>
    <button onclick="showFooter('impressum')">Impressum</button>
  </div>
  © 2026 IT ZONE
</footer>

<script>
let currentPage="home";

function show(page,btn){
  currentPage=page;

  if(btn){
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }

  render(page);
}

function showFooter(page){
  currentPage=page;
  render(page);

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));

  window.scrollTo({
    top:document.querySelector(".content").offsetTop-20,
    behavior:"smooth"
  });
}

function render(page){
  const title=document.getElementById("title");
  const content=document.getElementById("content");

  if(page==="home"){
    title.innerText="Početna";
    content.innerHTML=`<div class="section">Privatna IT stranica u razvoju.</div>`;
  }

  if(page==="apps"){
    title.innerText="Aplikacije";
    content.innerHTML=`<div class="section">Ovde dolaze tvoje aplikacije.</div>`;
  }

  if(page==="news"){
    title.innerText="Novosti";
    content.innerHTML=`<div class="section">Novosti i update.</div>`;
  }

  if(page==="privacy"){
    title.innerText="Privacy Policy";
    content.innerHTML=`<div class="section">Privacy tekst...</div>`;
  }

  if(page==="agb"){
    title.innerText="AGB";
    content.innerHTML=`<div class="section">Uslovi korišćenja...</div>`;
  }

  if(page==="impressum"){
    title.innerText="Impressum";
    content.innerHTML=`<div class="section">Lenard Zivanović<br>Wien</div>`;
  }

  if(page==="contact"){
    title.innerText="Kontakt";
    content.innerHTML=`<div class="section">itzoneapps1@gmail.com</div>`;
  }
}

render("home");
</script>

</body>
</html>
