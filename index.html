<style>
:root{
  --line:#d8e3f0;
  --shadow:0 20px 50px rgba(20,55,95,.16);
  --text:#223146;
  --muted:#5f6f86;
  --blue:#2455b2;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#f7fbff,#eef4fb);
  color:var(--text);
}

a{
  color:var(--blue);
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

.layout{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:20px;
}

/* HERO */
.hero{
  margin:20px;
  min-height:300px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  background:url("logo3.jpg") center/cover no-repeat;
  box-shadow:var(--shadow);
}

.hero-inner{
  position:relative;
  min-height:300px;
  padding:40px;
}

/* language */
.lang-wrap{
  position:absolute;
  top:16px;
  right:18px;
  z-index:5;
}

.lang-select{
  height:42px;
  min-width:108px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,.10);
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:0 12px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

/* meta */
.hero-meta{
  position:absolute;
  left:40px;
  bottom:6px;
  display:flex;
  gap:20px;
  font-weight:700;
  color:#111;
  font-size:14px;
  z-index:4;
  flex-wrap:wrap;
}

/* SIDEBAR */
.sidebar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
}

.sidebar h3{
  margin-bottom:10px;
  font-size:18px;
}

.sidebar button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  text-align:left;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  color:var(--text);
}

.sidebar button.active{
  background:#eef5ff;
  color:#2455b2;
}

/* CONTENT */
.content{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:30px;
  min-height:500px;
}

.content h2{
  font-size:32px;
  margin-bottom:8px;
}

.content-subtitle{
  color:var(--muted);
  font-size:15px;
  margin-bottom:22px;
}

.section{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:20px;
  margin-bottom:16px;
}

.section h3{
  font-size:20px;
  margin-bottom:10px;
}

.section p{
  color:var(--muted);
  font-size:15px;
  line-height:1.65;
  margin-bottom:10px;
}

.section ul{
  margin-left:18px;
  color:var(--muted);
}

.section li{
  margin-bottom:8px;
  line-height:1.6;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.app-card{
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  background:linear-gradient(180deg, #ffffff, #fbfdff);
}

.app-card h4{
  font-size:18px;
  margin-bottom:8px;
}

.app-card p{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

.note{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  background:#eef5ff;
  color:#2455b2;
  font-size:12px;
  font-weight:700;
  margin-bottom:12px;
}

footer{
  padding:20px;
  text-align:center;
  color:#5f6f86;
}

/* MOBILE */
@media (max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }

  .grid-2{
    grid-template-columns:1fr;
  }
}

@media (max-width:768px){
  .hero{
    min-height:220px;
  }

  .hero-inner{
    padding:20px;
    min-height:220px;
  }

  .hero-meta{
    left:20px;
    bottom:6px;
    gap:12px;
    font-size:12px;
    max-width:calc(100% - 40px);
  }

  .lang-wrap{
    top:12px;
    right:12px;
  }

  .lang-select{
    height:38px;
    min-width:94px;
    font-size:13px;
  }

  .content{
    padding:20px;
  }

  .content h2{
    font-size:26px;
  }
}
</style>
</head>

let currentLang = localStorage.getItem("site_lang") || "sr";
let currentPage = "home";

function localeForLang(lang){
  if(lang === "de") return "de-AT";
  if(lang === "hu") return "hu-HU";
  if(lang === "en") return "en-GB";
  return "sr-RS";
}

function pageSubtitle(t, key){
  if(key === "home") return t.homeSubtitle;
  if(key === "apps") return t.appsSubtitle;
  if(key === "news") return t.newsSubtitle;
  if(key === "privacy") return t.privacySubtitle;
  if(key === "impressum") return t.impressumSubtitle;
  if(key === "contact") return t.contactSubtitle;
  return "";
}

function pageHtml(t, key){
  if(key === "home") return t.homeHtml;
  if(key === "apps") return t.appsHtml;
  if(key === "news") return t.newsHtml;
  if(key === "privacy") return t.privacyHtml;
  if(key === "impressum") return t.impressumHtml;
  if(key === "contact") return t.contactHtml;
  return "";
}

function applyLanguage() {
  const t = i18n[currentLang];

  document.documentElement.lang = currentLang;
  document.getElementById("menuTitle").innerText = t.menuTitle;
  document.getElementById("footerText").innerText = t.footer;

  document.querySelector('[data-key="home"]').innerText = t.home;
  document.querySelector('[data-key="apps"]').innerText = t.apps;
  document.querySelector('[data-key="news"]').innerText = t.news;
  document.querySelector('[data-key="privacy"]').innerText = t.privacy;
  document.querySelector('[data-key="impressum"]').innerText = t.impressum;
  document.querySelector('[data-key="contact"]').innerText = t.contact;

  show(currentPage, document.querySelector(`[data-key="${currentPage}"]`), false);
}

function show(pageKey, btn, updateActive = true){
  currentPage = pageKey;
  const t = i18n[currentLang];

  document.getElementById("title").innerText = t[pageKey];
  document.getElementById("subtitle").innerText = pageSubtitle(t, pageKey);
  document.getElementById("contentArea").innerHTML = pageHtml(t, pageKey);

  if(updateActive){
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
}

function updateTime(){
  const now = new Date();
  document.getElementById("time").innerText = now.toLocaleTimeString(localeForLang(currentLang));
  document.getElementById("date").innerText = now.toLocaleDateString(localeForLang(currentLang));
}

fetch("https://api.open-meteo.com/v1/forecast?latitude=48.2&longitude=16.37&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("temp").innerText = Math.round(d.current_weather.temperature) + "°C";
})
.catch(()=>{
  document.getElementById("temp").innerText = "N/A";
});

document.getElementById("langSelect").value = currentLang;
document.getElementById("langSelect").addEventListener("change", function(){
  currentLang = this.value;
  localStorage.setItem("site_lang", currentLang);
  applyLanguage();
  updateTime();
});

setInterval(updateTime, 1000);
applyLanguage();
updateTime();
</script>
