<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IT ZONE</title>

<style>
:root{
  --bg:#eef4fb;
  --white:#ffffff;
  --line:#d8e3f0;
  --text:#223146;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:var(--bg);
}

/* ===== BANNER ===== */
.banner{
  margin:20px;
  height:300px;
  border-radius:20px;
  position:relative;
  overflow:hidden;

  background:
    linear-gradient(rgba(15,50,100,.6), rgba(15,50,100,.6)),
    url("logo3.jpg") center/cover;
}

.banner-content{
  position:absolute;
  left:40px;
  top:40px;
  color:white;
}

.banner h1{
  font-size:50px;
}

.banner p{
  margin-top:10px;
}

/* LOGO DESNO */
.banner-logo{
  position:absolute;
  right:40px;
  bottom:40px;
  width:260px;
}

.banner-logo img{
  width:100%;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.4));
}

/* META (datum, vreme...) */
.banner-meta{
  position:absolute;
  left:40px;
  bottom:20px;
  color:white;
  font-size:13px;
  display:flex;
  gap:20px;
}

/* ===== LAYOUT ===== */
.layout{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:20px;
}

/* SIDEBAR */
.sidebar{
  background:white;
  padding:20px;
  border-radius:15px;
  border:1px solid var(--line);
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:white;
  cursor:pointer;
  font-weight:bold;
}

/* CONTENT */
.content{
  background:white;
  padding:30px;
  border-radius:15px;
  border:1px solid var(--line);
}

.badge{
  background:#ffe9b3;
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  display:inline-block;
  margin:10px 0;
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">

  <div class="banner-content">
    <h1>IT ZONE</h1>
    <p>Web & App Development</p>
  </div>

  <div class="banner-logo">
    <img src="logo2.jpg">
  </div>

  <div class="banner-meta">
    <div id="date"></div>
    <div id="time"></div>
    <div id="temp"></div>
    <div id="visits"></div>
  </div>

</div>

<!-- MAIN -->
<div class="layout">

  <div class="sidebar">
    <button onclick="show('Početna')">Početna</button>
    <button onclick="show('Aplikacije')">Naše aplikacije</button>
    <button onclick="show('Novosti')">Novosti</button>
    <button onclick="show('Privacy')">Privacy</button>
    <button onclick="show('Impressum')">Impressum</button>
    <button onclick="show('Kontakt')">Kontakt</button>
  </div>

  <div class="content">
    <h2 id="title">Početna</h2>
    <div class="badge">U izradi</div>
    <p>Stranica je u fazi izrade.</p>
  </div>

</div>

<script>
// vreme + datum
function updateTime(){
  const now = new Date();

  document.getElementById("time").innerText =
    now.toLocaleTimeString("sr-RS");

  document.getElementById("date").innerText =
    now.toLocaleDateString("sr-RS");
}
setInterval(updateTime,1000);
updateTime();

// posete
let v = localStorage.getItem("visits") || 0;
v++;
localStorage.setItem("visits", v);
document.getElementById("visits").innerText = "Posete: " + v;

// temperatura
fetch("https://api.open-meteo.com/v1/forecast?latitude=48.2&longitude=16.37&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("temp").innerText =
    Math.round(d.current_weather.temperature)+"°C";
});

// navigacija
function show(name){
  document.getElementById("title").innerText = name;
}
</script>

</body>
</html>
