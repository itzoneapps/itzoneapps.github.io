<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IT ZONE</title>

<style>
:root{
  --bg:#eef4fb;
  --white:#ffffff;
  --line:#d8e3f0;
  --text:#223146;
  --muted:#6c7b91;
  --blue:#0f5ea8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#f7fbff,#eef4fb);
  color:var(--text);
}

/* HEADER */
.topbar{
  position:sticky;
  top:0;
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  width:48px;
  height:48px;
  object-fit:contain;
}

.brand-title{
  font-weight:900;
  font-size:20px;
}

.nav{
  display:flex;
  gap:8px;
}

.nav button{
  padding:10px 14px;
  border:none;
  background:#fff;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.nav button.active{
  background:var(--blue);
  color:#fff;
}

/* BANNER */
.banner{
  margin:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#0f5ea8,#2d7bd4);
  color:#fff;
  padding:40px;
  display:flex;
  align-items:center;
  gap:20px;
}

.banner img{
  width:100px;
}

.banner h1{
  font-size:36px;
  font-weight:300;
}

/* CONTENT */
.content{
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:30px;
  border-radius:16px;
  border:1px solid var(--line);
}

/* CONSTRUCTION */
.construction{
  text-align:center;
  padding:50px;
}

.tag{
  margin-top:10px;
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:#ffe8a3;
  font-weight:700;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  color:var(--muted);
}
</style>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <!-- LOGO 1 -->
    <img src="logo.png" alt="logo">
    <div class="brand-title">IT ZONE</div>
  </div>

  <div class="nav">
    <button onclick="showPage('home')" class="active">Početna</button>
    <button onclick="showPage('apps')">Naše aplikacije</button>
    <button onclick="showPage('news')">Novosti</button>
    <button onclick="showPage('contact')">Kontakt</button>
    <button onclick="showPage('privacy')">Privacy</button>
    <button onclick="showPage('impressum')">Impressum</button>
  </div>
</header>

<section class="banner">
  <!-- LOGO 2 -->
  <img src="logo-banner.png" alt="logo">
  <h1 id="title">IT ZONE</h1>
</section>

<div class="content" id="content"></div>

<div class="footer">
© 2026 IT ZONE
</div>

<script>

function construction(name){
  return `
    <div class="construction">
      <h2>${name}</h2>
      <p>Stranica je trenutno u izradi.</p>
      <div class="tag">U izradi</div>
    </div>
  `;
}

const pages = {

  home: `
    <h2>Dobrodošli</h2>
    <p>IT ZONE je fokusiran na razvoj mobilnih aplikacija i web rešenja.</p>
  `,

  apps: construction("Naše aplikacije"),

  news: construction("Novosti"),

  contact: `
    <h2>Kontakt</h2>
    <p>Email: <b>itzoneapps1@gmail.com</b></p>
  `,

  privacy: `
    <h2>Privacy Policy</h2>
    <p>Ne prikupljamo lične podatke bez saglasnosti korisnika.</p>
    <p>Kontakt putem emaila koristi se isključivo za odgovor.</p>
  `,

  impressum: `
    <h2>Impressum</h2>
    <p>IT ZONE</p>
    <p>Wien, Österreich</p>
    <p>Email: itzoneapps1@gmail.com</p>
  `
};

function showPage(key){
  document.getElementById("content").innerHTML = pages[key];
  document.getElementById("title").textContent = key === "home" ? "IT ZONE" : key;

  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

showPage("home");

</script>

</body>
</html>
