<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IT ZONE</title>
<meta name="description" content="IT ZONE privatna informativna web stranica u razvoju." />

<style>
:root{
  --line:#d8e3f0;
  --shadow:0 20px 50px rgba(20,55,95,.16);
  --text:#223146;
  --muted:#5f6f86;
  --blue:#2455b2;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#f7fbff,#eef4fb);
  color:var(--text);
}

a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}

.hero{
  margin:20px;
  min-height:300px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  background:url("logo3.jpg") center/cover no-repeat;
  box-shadow:var(--shadow);
}

.hero-inner{
  position:relative;
  min-height:300px;
  padding:40px;
}

.lang-wrap{
  position:absolute;
  top:16px;
  right:18px;
  z-index:5;
}

.lang-select{
  height:42px;
  min-width:108px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,.10);
  background:rgba(255,255,255,.88);
  padding:0 12px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.hero-meta{
  position:absolute;
  left:40px;
  bottom:6px;
  display:flex;
  gap:20px;
  font-weight:700;
  color:#111;
  font-size:14px;
  z-index:4;
  flex-wrap:wrap;
}

.layout{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:20px;
}

.sidebar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
  min-height:220px;
}

.sidebar h3{
  margin-bottom:10px;
  font-size:18px;
}

.sidebar button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  text-align:left;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  color:var(--text);
}

.sidebar button.active{
  background:#eef5ff;
  color:#2455b2;
  border-color:#2455b2;
}

.content{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:34px;
  min-height:720px;
}

.content h2{
  font-size:34px;
  margin-bottom:18px;
}

.construction-box{
  min-height:560px;
  border:1px solid var(--line);
  border-radius:22px;
  position:relative;
  overflow:hidden;
  text-align:center;
  padding:40px 20px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.96),rgba(248,251,255,.98)),
    repeating-linear-gradient(45deg,rgba(36,85,178,.035) 0 12px,transparent 12px 24px);
}

.site-scene{
  position:relative;
  height:315px;
  max-width:860px;
  margin:0 auto 22px;
}

.sun{
  position:absolute;
  top:18px;
  right:70px;
  width:54px;
  height:54px;
  border-radius:50%;
  background:#fff4b8;
  box-shadow:0 0 35px rgba(255,210,80,.55);
  animation:sunPulse 3s infinite ease-in-out;
}

.crane-tower{
  position:absolute;
  left:105px;
  bottom:38px;
  width:18px;
  height:220px;
  background:#223146;
  border-radius:8px;
}

.crane-arm{
  position:absolute;
  left:111px;
  top:48px;
  width:360px;
  height:14px;
  background:#223146;
  border-radius:999px;
  transform-origin:left center;
  animation:craneMove 4s infinite ease-in-out;
}

.crane-cable{
  position:absolute;
  left:445px;
  top:60px;
  width:3px;
  height:88px;
  background:#223146;
  animation:cableMove 4s infinite ease-in-out;
}

.crane-hook{
  position:absolute;
  left:432px;
  top:144px;
  font-size:34px;
  animation:hookMove 4s infinite ease-in-out;
}

.building-text{
  position:absolute;
  left:220px;
  top:165px;
  display:flex;
  gap:6px;
  font-weight:900;
  font-size:34px;
  color:#2455b2;
  letter-spacing:1px;
  white-space:nowrap;
}

.building-text span{
  display:inline-block;
  opacity:0;
  transform:translateY(30px) rotate(-8deg);
  animation:letterBuild 3.8s infinite ease-in-out;
}

.building-text .space{width:15px;}

.worker{
  position:absolute;
  left:455px;
  bottom:60px;
  font-size:54px;
  animation:workerMove 1.2s infinite ease-in-out;
}

.shovel{
  position:absolute;
  left:500px;
  bottom:100px;
  font-size:36px;
  transform-origin:left bottom;
  animation:shovelThrow 1.4s infinite ease-in-out;
}

.flying-letter{
  position:absolute;
  left:515px;
  bottom:148px;
  font-size:28px;
  font-weight:900;
  color:#2455b2;
  animation:letterThrow 1.4s infinite ease-in-out;
}

.flying-letter.two{animation-delay:.45s;color:#223146;}
.flying-letter.three{animation-delay:.9s;color:#2455b2;}

.mixer{
  position:absolute;
  left:585px;
  bottom:58px;
  font-size:58px;
  animation:mixerSpin 1.4s infinite ease-in-out;
}

.truck{
  position:absolute;
  left:25px;
  bottom:42px;
  font-size:68px;
  animation:truckMove 6s infinite ease-in-out;
}

.ground{
  position:absolute;
  left:35px;
  right:35px;
  bottom:30px;
  height:10px;
  border-radius:999px;
  background:linear-gradient(90deg,#d8e3f0,#b9c9db,#d8e3f0);
}

.dust{
  position:absolute;
  left:180px;
  bottom:52px;
  font-size:22px;
  opacity:.45;
  animation:dustMove 2s infinite ease-in-out;
}

.construction-box h3{
  font-size:30px;
  margin-bottom:10px;
}

.construction-box p{
  color:var(--muted);
  font-size:18px;
  line-height:1.6;
  max-width:760px;
  margin:0 auto;
}

.apps-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.app-card{
  border:1px solid var(--line);
  border-radius:22px;
  padding:24px;
  background:linear-gradient(180deg,#ffffff,#fbfdff);
  box-shadow:0 14px 35px rgba(20,55,95,.10);
}

.app-badge{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  background:#eef5ff;
  color:#2455b2;
  font-size:12px;
  font-weight:800;
  margin-bottom:12px;
}

.app-card h3{
  font-size:24px;
  margin-bottom:10px;
}

.app-card p{
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
  margin-bottom:16px;
}

.app-features{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:18px;
}

.app-features span{
  border:1px solid var(--line);
  background:#fff;
  color:#5f6f86;
  border-radius:999px;
  padding:7px 10px;
  font-size:12px;
  font-weight:700;
}

.app-button{
  display:inline-block;
  padding:12px 16px;
  border-radius:14px;
  background:#2455b2;
  color:#fff;
  font-weight:800;
  font-size:14px;
}

.app-button:hover{
  text-decoration:none;
  background:#1f4897;
}

.footer-links{
  padding:32px 20px 46px;
  text-align:center;
  color:#8a96a8;
  font-size:11px;
}

.footer-nav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:8px;
  opacity:.55;
}

.footer-nav button{
  border:0;
  background:transparent;
  color:#7d899a;
  font-size:11px;
  cursor:pointer;
  padding:2px 3px;
}

.footer-nav button:hover{
  color:#2455b2;
  text-decoration:underline;
}

.footer-nav span{color:#aab4c2;}

@keyframes craneMove{0%,100%{transform:rotate(-1deg);}50%{transform:rotate(4deg);}}
@keyframes cableMove{0%,100%{height:88px;transform:translateX(0);}50%{height:112px;transform:translateX(22px);}}
@keyframes hookMove{0%,100%{transform:translateX(0) translateY(0);}50%{transform:translateX(22px) translateY(24px);}}
@keyframes letterBuild{0%{opacity:0;transform:translateY(35px) rotate(-12deg) scale(.75);}35%,75%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}100%{opacity:0;transform:translateY(-12px) rotate(8deg) scale(1);}}
@keyframes workerMove{0%,100%{transform:rotate(-5deg) translateY(0);}50%{transform:rotate(7deg) translateY(-5px);}}
@keyframes shovelThrow{0%,100%{transform:rotate(-35deg);}50%{transform:rotate(35deg) translateY(-8px);}}
@keyframes letterThrow{0%{opacity:0;transform:translate(0,0) scale(.7) rotate(-10deg);}25%{opacity:1;}70%{opacity:1;transform:translate(70px,45px) scale(1.1) rotate(12deg);}100%{opacity:0;transform:translate(95px,62px) scale(.6) rotate(20deg);}}
@keyframes mixerSpin{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(8deg);}}
@keyframes truckMove{0%{transform:translateX(-25px);}45%,65%{transform:translateX(85px);}100%{transform:translateX(-25px);}}
@keyframes dustMove{0%,100%{opacity:.15;transform:translateX(0) scale(.8);}50%{opacity:.55;transform:translateX(40px) scale(1.15);}}
@keyframes sunPulse{0%,100%{transform:scale(1);opacity:.8;}50%{transform:scale(1.08);opacity:1;}}

@media (max-width:900px){
  .layout{
    grid-template-columns:1fr;
    gap:16px;
    padding:16px;
  }

  .apps-grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:768px){
  body{
    background:linear-gradient(180deg,#eef4fb,#f7fbff);
  }

  .hero{

    width:100%;
    min-height:235px;
    border-radius:0;
    background-size:contain;
    background-position:center center;
    background-repeat:no-repeat;
    background-color:#fff;

  /* ===== APP FACTORY STYLE ===== */

.app-factory{
  position:relative;
  height:280px;
  margin-top:30px;
  border-radius:16px;
  background:#f4f8ff;
  border:1px solid var(--line);
}

.factory-logo{
  position:absolute;
  top:10px;
  left:10px;
  background:#223146;
  color:#fff;
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:800;
}

.worker-factory{
  position:absolute;
  left:80px;
  top:90px;
  font-size:40px;
  animation:workerMove 1.2s infinite;
}

.belt{
  position:absolute;
  left:20px;
  right:20px;
  bottom:80px;
  height:40px;
  background:#d8e3f0;
  border-radius:10px;
  overflow:hidden;
}

.belt-line{
  position:absolute;
  inset:0;

  animation:beltMove 1s linear infinite;
}

.app-part{
  position:absolute;
  top:5px;

}

.part-2{animation-delay:.5s;}
.part-3{animation-delay:1s;}

.machine{
  position:absolute;

}

.machine-top{

.press{

.finished-app{

}

.mini-crane-hook{

  right:40px;

.train{

  right:10px;
  bottom:20px;
  font-size:40px;
  animation:trainMove 4s infinite;
}

/* ANIMACIJE */
@keyframes beltMove{
  0%{transform:translateX(0);}
  100%{transform:translateX(20px);}
}

@keyframes moveParts{
  0%{left:0;}
  100%{left:300px; opacity:0;}
}

@keyframes press{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(20px);}
}

@keyframes appShow{
  0%,50%{opacity:0;}
  60%,90%{opacity:1;}
  100%{opacity:0;}
}

@keyframes craneMove{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(-30px);}
}

@keyframes trainMove{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(-20px);}
}

let currentLang = localStorage.getItem("site_lang") || "sr";
let currentPage = "home";

function localeForLang(lang){
  if(lang === "de") return "de-AT";
  if(lang === "hu") return "hu-HU";
  if(lang === "en") return "en-GB";
  return "sr-RS";
}

function constructionHtml(){
  const t = i18n[currentLang];

  return `
    <div class="construction-box">
      <div class="site-scene">
        <div class="sun"></div>
        <div class="crane-tower"></div>
        <div class="crane-arm"></div>

function applyLanguage(){
  const t = i18n[currentLang];

  document.documentElement.lang = currentLang;
  document.getElementById("menuTitle").innerText = t.menuTitle;
  document.getElementById("footerText").innerText = t.footer;

  document.querySelector('[data-key="home"]').innerText = t.home;
  document.querySelector('[data-key="apps"]').innerText = t.apps;
  document.querySelector('[data-key="news"]').innerText = t.news;

  render(currentPage);
  updateTime();
}

function show(pageKey, btn){
  currentPage = pageKey;

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");

  render(pageKey);
}

function showFooterPage(pageKey){
  currentPage = pageKey;

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  render(pageKey);

  window.scrollTo({
    top: document.querySelector(".content").offsetTop - 20,
    behavior: "smooth"
  });
}

function render(pageKey){
  const t = i18n[currentLang];

  if(pageKey === "home"){
    document.getElementById("title").innerText = t.home;
    document.getElementById("contentArea").innerHTML = homeHtml();
    return;
  }

  if(pageKey === "apps"){
    document.getElementById("title").innerText = t.apps;
    document.getElementById("contentArea").innerHTML = appsHtml();
    return;
  }

  if(pageKey === "news"){
    document.getElementById("title").innerText = t.news;
    document.getElementById("contentArea").innerHTML = newsHtml();
    return;
  }

  document.getElementById("title").innerText = t[pageKey] || pageKey;
  document.getElementById("contentArea").innerHTML = footerPageHtml(pageKey);
}

function updateTime(){
  const now = new Date();

  document.getElementById("date").innerText =
    now.toLocaleDateString(localeForLang(currentLang));

  document.getElementById("time").innerText =
    now.toLocaleTimeString(localeForLang(currentLang));
}

fetch("https://api.open-meteo.com/v1/forecast?latitude=48.2&longitude=16.37&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("temp").innerText = Math.round(d.current_weather.temperature) + "°C";
})
.catch(()=>{
  document.getElementById("temp").innerText = "24°C";
});

document.getElementById("langSelect").value = currentLang;

document.getElementById("langSelect").addEventListener("change", function(){
  currentLang = this.value;
  localStorage.setItem("site_lang", currentLang);
  applyLanguage();
});

setInterval(updateTime, 1000);

applyLanguage();
updateTime();
</script>
