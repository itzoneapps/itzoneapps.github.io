<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IT ZONE</title>

<style>
:root{
  --bg:#eef4fb;
  --white:#ffffff;
  --line:#d8e3f0;
  --text:#223146;
  --muted:#6c7b91;
  --blue:#0f5ea8;
  --glass:rgba(255,255,255,.14);
  --glass-line:rgba(255,255,255,.18);
  --shadow:0 20px 50px rgba(20, 55, 95, .16);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:linear-gradient(180deg, #f7fbff 0%, #eef4fb 100%);
  color:var(--text);
}

.layout{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:20px;
}

/* HERO */
.hero{
  margin:20px 20px 0;
  min-height:240px;
  border-radius:28px;
  overflow:hidden;
  position:relative;

  /* 🔥 OVDE SAM UKLONIO SLIKU */
  background:linear-gradient(135deg, #0f3b75, #2f80dc);

  box-shadow:var(--shadow);
}

/* uklonjen hero-left skroz */
.hero-inner{
  position:relative;
  min-height:240px;
}

/* META dole */
.hero-meta{
  position:absolute;
  left:20px;
  bottom:12px;
  display:flex;
  gap:15px;
  color:#fff;
  font-size:13px;
  opacity:0.9;
}

/* SIDEBAR */
.sidebar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
  box-shadow:0 12px 30px rgba(40,72,110,.07);
}

.sidebar button{
  width:100%;
  padding:13px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  font-weight:bold;
}

.sidebar button.active{
  background:#eef5ff;
}

/* CONTENT */
.content{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:30px;
}

/* FOOTER */
footer{
  padding:20px;
}

.footer-box{
  background:#fff;
  border-radius:18px;
  padding:15px;
  text-align:center;
  border:1px solid var(--line);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-meta">
      <div id="date"></div>
      <div id="time"></div>
      <div id="temp"></div>
      <div id="visits"></div>
    </div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <button class="active" onclick="show('Početna', this)">Početna</button>
    <button onclick="show('Naše aplikacije', this)">Naše aplikacije</button>
    <button onclick="show('Novosti', this)">Novosti</button>
    <button onclick="show('Privacy Policy', this)">Privacy Policy</button>
    <button onclick="show('Impressum', this)">Impressum</button>
    <button onclick="show('Kontakt', this)">Kontakt</button>
  </aside>

  <main class="content">
    <h2 id="title">Početna</h2>
    <p>Stranica je u fazi izrade.</p>
  </main>
</div>

<footer>
  <div class="footer-box">
    © 2026 IT ZONE. Sva prava zadržana.
  </div>
</footer>

<script>
function show(name, btn){
  document.getElementById("title").innerText = name;
  document.querySelectorAll(".sidebar button")
    .forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// vreme
function updateTime(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString("sr-RS");
  document.getElementById("date").innerText =
    now.toLocaleDateString("sr-RS");
}
setInterval(updateTime,1000);
updateTime();

// posete
let v = localStorage.getItem("visits") || 0;
v++;
localStorage.setItem("visits", v);
document.getElementById("visits").innerText = v;

// temp
fetch("https://api.open-meteo.com/v1/forecast?latitude=48.2&longitude=16.37&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("temp").innerText =
    Math.round(d.current_weather.temperature)+"°C";
});
</script>

</body>
</html>
