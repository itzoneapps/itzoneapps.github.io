<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IT ZONE</title>

<style>
:root{
  --bg:#eef4fb;
  --white:#ffffff;
  --line:#d8e3f0;
  --text:#223146;
  --blue:#0f5ea8;
  --orange:#ff9f43;
  --green:#2fbe7f;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* ===== BANNER ===== */
.banner{
  margin:20px;
  border-radius:20px;
  overflow:hidden;
  height:260px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:40px;
  background:
    linear-gradient(rgba(20,60,110,0.7), rgba(20,60,110,0.7)),
    url("logo3.jpg") center/cover;
}

.banner h1{
  color:white;
  font-size:50px;
}

.banner p{
  color:white;
  margin-top:10px;
}

.banner-logo{
  width:250px;
  height:150px;
  background:white;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.banner-logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* ===== STATS ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin:20px;
}

.stat{
  background:white;
  padding:20px;
  border-radius:15px;
  border:1px solid var(--line);
}

.stat h4{
  font-size:13px;
  color:#777;
}

.stat span{
  font-size:24px;
  font-weight:bold;
}

.orange{color:var(--orange);}
.green{color:var(--green);}

/* ===== LAYOUT ===== */
.layout{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:20px;
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:white;
  padding:20px;
  border-radius:15px;
  border:1px solid var(--line);
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:white;
  cursor:pointer;
  font-weight:bold;
}

.sidebar button:hover{
  background:#eef5ff;
}

/* ===== CONTENT ===== */
.content{
  background:white;
  padding:30px;
  border-radius:15px;
  border:1px solid var(--line);
}

.content h2{
  margin-bottom:10px;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:10px;
  background:#ffe9b3;
  font-size:12px;
  margin-bottom:20px;
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <div>
    <h1>IT ZONE</h1>
    <p>Web & App Development</p>
  </div>

  <div class="banner-logo">
    <img src="logo2.jpg">
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h4>Datum</h4>
    <span id="date"></span>
  </div>

  <div class="stat">
    <h4>Vreme</h4>
    <span id="time"></span>
  </div>

  <div class="stat">
    <h4>Temperatura</h4>
    <span class="green" id="temp">-- °C</span>
  </div>

  <div class="stat">
    <h4>Posete</h4>
    <span class="orange" id="visits">0</span>
  </div>
</div>

<!-- MAIN -->
<div class="layout">

  <!-- SIDE -->
  <div class="sidebar">
    <button onclick="show('Početna')">Početna</button>
    <button onclick="show('Aplikacije')">Naše aplikacije</button>
    <button onclick="show('Novosti')">Novosti</button>
    <button onclick="show('Privacy')">Privacy</button>
    <button onclick="show('Impressum')">Impressum</button>
    <button onclick="show('Kontakt')">Kontakt</button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <h2 id="title">Početna</h2>
    <div class="badge">U izradi</div>
    <p>Stranica je u fazi izrade.</p>
  </div>

</div>

<script>
// vreme
function updateTime(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString("sr-RS");
  document.getElementById("date").innerText =
    now.toLocaleDateString("sr-RS");
}
setInterval(updateTime,1000);
updateTime();

// posete
let v = localStorage.getItem("visits") || 0;
v++;
localStorage.setItem("visits", v);
document.getElementById("visits").innerText = v;

// temperatura
fetch("https://api.open-meteo.com/v1/forecast?latitude=48.2&longitude=16.37&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("temp").innerText =
    Math.round(d.current_weather.temperature)+" °C";
});

// navigacija
function show(name){
  document.getElementById("title").innerText = name;
}
</script>

</body>
</html>
