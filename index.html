<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT ZONE</title>
  <meta name="description" content="IT ZONE premium probna web stranica." />
  <style>
    :root{
      --bg:#eef4fb;
      --white:#ffffff;
      --line:#d8e3f0;
      --text:#223146;
      --muted:#6c7b91;
      --blue:#0f5ea8;
      --shadow:0 20px 50px rgba(20, 55, 95, .16);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg, #f7fbff 0%, #eef4fb 100%);
      color:var(--text);
    }

    button{
      font-family:inherit;
    }

    .layout{
      display:grid;
      grid-template-columns:250px 1fr;
      gap:20px;
      padding:20px;
      align-items:start;
    }

    /* HERO */
    .hero{
      margin:20px 20px 0;
      min-height:300px;
      border-radius:28px;
      overflow:hidden;
      position:relative;
      background:linear-gradient(135deg, #22498c 0%, #4d82d1 100%);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.18);
      isolation:isolate;
    }

    /* plavi glow sloj */
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 18% 30%, rgba(255,255,255,.10), transparent 20%),
        radial-gradient(circle at 82% 24%, rgba(255,255,255,.08), transparent 18%);
      z-index:0;
      pointer-events:none;
    }

    /* crni logo preko cele plave pozadine */
    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:url("logo3.jpg") center center / cover no-repeat;
      opacity:.28;
      mix-blend-mode:multiply;
      filter:contrast(1.08);
      z-index:1;
      pointer-events:none;
    }

    .hero-inner{
      position:relative;
      z-index:2;
      min-height:300px;
      padding:40px 38px 26px;
      display:flex;
      align-items:flex-start;
    }

    .hero-meta{
      position:absolute;
      left:38px;
      right:38px;
      bottom:18px;
      display:flex;
      flex-wrap:wrap;
      gap:18px;
      align-items:center;
      z-index:3;
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      color:#fff;
      font-size:13px;
      font-weight:800;
      text-shadow:0 2px 8px rgba(0,0,0,.18);
    }

    .meta-green{ color:#bff0cf; }
    .meta-orange{ color:#ffd2a0; }

    /* SIDEBAR */
    .sidebar{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      box-shadow:0 12px 30px rgba(40,72,110,.07);
      position:sticky;
      top:20px;
    }

    .sidebar h3{
      font-size:18px;
      margin-bottom:14px;
    }

    .sidebar button{
      width:100%;
      padding:13px;
      margin-bottom:10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:#2d3c55;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      transition:.2s ease;
      text-align:left;
    }

    .sidebar button:hover{
      background:#f5f9ff;
      transform:translateY(-1px);
    }

    .sidebar button.active{
      background:#eef5ff;
      color:#2455b2;
    }

    /* CONTENT */
    .content{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:30px;
      box-shadow:0 12px 30px rgba(40,72,110,.07);
      min-height:560px;
    }

    .content h2{
      font-size:36px;
      color:#1d2b40;
      font-weight:900;
      letter-spacing:-.8px;
      margin-bottom:8px;
    }

    .content p{
      color:#6b7b91;
      font-size:15px;
    }

    /* FOOTER */
    footer{
      padding:0 20px 34px;
    }

    .footer-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      text-align:center;
      box-shadow:0 12px 30px rgba(40,72,110,.07);
    }

    .footer-box span{
      color:#72839a;
      font-size:14px;
      font-weight:700;
    }

    @media (max-width: 1180px){
      .layout{
        grid-template-columns:1fr;
      }

      .sidebar{
        position:static;
      }

      .hero-meta{
        position:relative;
        left:auto;
        right:auto;
        bottom:auto;
        margin-top:18px;
      }
    }

    @media (max-width: 560px){
      .hero,
      .sidebar,
      .content{
        border-radius:18px;
      }

      .hero{
        min-height:250px;
      }

      .hero-inner{
        padding:22px 20px 20px;
        min-height:250px;
      }

      .hero-meta{
        gap:10px;
      }

      .meta-pill{
        font-size:12px;
        padding:8px 12px;
      }

      .content h2{
        font-size:28px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-meta">
        <div class="meta-pill"><span id="date">--</span></div>
        <div class="meta-pill"><span id="time">--</span></div>
        <div class="meta-pill meta-green"><span id="temp">-- °C</span></div>
        <div class="meta-pill meta-orange"><span id="visits">0</span></div>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <h3>Glavni meni</h3>
      <button class="active" onclick="show('Početna', this)">Početna</button>
      <button onclick="show('Naše aplikacije', this)">Naše aplikacije</button>
      <button onclick="show('Novosti', this)">Novosti</button>
      <button onclick="show('Privacy Policy', this)">Privacy Policy</button>
      <button onclick="show('Impressum', this)">Impressum</button>
      <button onclick="show('Kontakt', this)">Kontakt</button>
    </aside>

    <main class="content">
      <h2 id="title">Početna</h2>
      <p>Stranica je u fazi izrade.</p>
    </main>
  </div>

  <footer>
    <div class="footer-box">
      <span>© 2026 IT ZONE. Sva prava zadržana.</span>
    </div>
  </footer>

  <script>
    function show(name, btn){
      document.getElementById("title").innerText = name;
      document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    function updateTime(){
      const now = new Date();
      document.getElementById("time").innerText = now.toLocaleTimeString("sr-RS");
      document.getElementById("date").innerText = now.toLocaleDateString("sr-RS");
    }
    setInterval(updateTime,1000);
    updateTime();

    let v = localStorage.getItem("visits") || 0;
    v++;
    localStorage.setItem("visits", v);
    document.getElementById("visits").innerText = v;

    fetch("https://api.open-meteo.com/v1/forecast?latitude=48.2&longitude=16.37&current_weather=true")
    .then(r=>r.json())
    .then(d=>{
      document.getElementById("temp").innerText =
        Math.round(d.current_weather.temperature)+" °C";
    })
    .catch(()=>{
      document.getElementById("temp").innerText = "N/A";
    });
  </script>

</body>
</html>
